name: Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-format:
    if: github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release-please-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Run Prek
        uses: j178/prek-action@v2

  web-test:
    needs: lint-format
    if: github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release-please-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if web/ path changed
        id: web-changes
        run: |
          if git diff --name-only origin/main...HEAD | grep -q "^web/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up NPM
        if: steps.web-changes.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Cache NPM dependencies
        if: steps.web-changes.outputs.changed == 'true'
        uses: actions/cache@v5
        with:
          path: web/frontend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('web/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install NPM dependencies
        if: steps.web-changes.outputs.changed == 'true'
        run: npm ci --prefix web/frontend

      - name: Run npm build
        if: steps.web-changes.outputs.changed == 'true'
        run: npm run build --prefix web/frontend

  test:
    needs: lint-format
    if: github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release-please-')
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: cidb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/cidb
          ENVIRONMENT: testing
          DJANGO_SETTINGS_MODULE: svs_core.db.settings
        run: |
          pytest -n auto --cov=. --cov-branch --cov-report=xml:coverage.xml -q

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

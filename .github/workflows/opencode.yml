name: PR Agent (OpenCode Go - Protected)

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    if: >-
      github.event.sender.type != 'Bot' && (
        (github.event_name == 'pull_request' && contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)) ||
        (github.event_name == 'issue_comment' && contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association))
      )

    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - name: PR Agent action step
        uses: the-pr-agent/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          OPENAI__API_BASE: "https://opencode.ai/zen/go/v1"
          OPENAI__KEY: ${{ secrets.OPENCODE_API_KEY }}

          # Target Model Selection
          CONFIG__MODEL: "openai/deepseek-v4-flash"
          CONFIG__CUSTOM_MODEL_MAX_TOKENS: "128000"

          github_action_config.auto_review: "true"

repos:
  - repo: local
    hooks:
      - id: semantic-commit
        name: Check semantic commit message
        entry: "bash -c 'grep -Eq \"^(feat|fix|chore|docs|style|refactor|test|perf)(\\(.+\\))?: .+\" \"$1\"' --"
        language: system
        stages: [commit-msg]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: pretty-format-json
        stages: [pre-commit]
        args:
          - --autofix
          - --indent
          - "\t"
        exclude: package(-lock)?\.json$
      - id: requirements-txt-fixer
        stages: [pre-commit]
      - id: check-docstring-first
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: mixed-line-ending
        stages: [pre-commit]
        args: ["--fix=lf"]

  #- repo: https://github.com/typstyle-rs/pre-commit-typstyle
  #rev: v0.14.4
  #hooks:
  #- id: typstyle
  #language: rust
  #files: \.typ$

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language: system
        stages: [pre-commit]
        args: ["--fast"]

  - repo: https://github.com/PyCQA/isort
    rev: 6.0.1
    hooks:
      - id: isort
        language: system
        stages: [pre-commit]
        args: ["--settings-path", ".isort.cfg"]

  - repo: https://github.com/myint/docformatter
    rev: v1.7.7
    hooks:
      - id: docformatter
        stages: [pre-commit]
        args: ["--in-place", "--recursive", "--wrap-summaries", "79"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff
        stages: [pre-commit]
        args: [--fix]

  - repo: https://github.com/djlint/djlint
    rev: v1.36.4
    hooks:
      - id: djlint
        stages: [pre-commit]
        args: ["--lint", "--reformat"]
        files: \.html$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.1
    hooks:
      - id: mypy
        stages: [pre-commit]
        args: ["--config-file", "mypy.ini"]
        files: ^(svs_core|tests|docs)/
        language: system
